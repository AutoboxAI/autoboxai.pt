<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUTOBOXAI®</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #020202;
      color: #f5f5f5;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8vw;
      background:
        radial-gradient(circle at 75% 50%, rgba(255,130,0,0.12), transparent 28%),
        linear-gradient(90deg, #020202 0%, #050505 55%, #000 100%);
      animation: fadeIn 1.8s ease forwards;
    }

    .logo {
      font-size: clamp(2.5rem, 7vw, 6.5rem);
      letter-spacing: 0.22em;
      font-weight: 600;
      margin-bottom: 4rem;
      color: #ffffff;
    }

    .logo span {
      color: #ff8a00;
    }

    .registered {
      font-size: 0.28em;
      vertical-align: top;
      margin-left: 0.2rem;
    }

    .line {
      width: 48px;
      height: 2px;
      background: #ff8a00;
      margin-bottom: 2.5rem;
    }

    .headline {
      font-size: clamp(1.5rem, 4vw, 3.2rem);
      letter-spacing: 0.35em;
      line-height: 1.8;
      max-width: 850px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .headline span {
      color: #ff8a00;
    }

    .soon {
      margin-top: 4rem;
      color: #ff8a00;
      letter-spacing: 0.45em;
      font-size: 1.3rem;
    }

    .footer {
      position: fixed;
      bottom: 35px;
      left: 8vw;
      right: 8vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #888;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
    }

    .links a {
      color: #f5f5f5;
      text-decoration: none;
      margin-right: 22px;
      border: 1px solid #444;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .links a:hover {
      color: #ff8a00;
      border-color: #ff8a00;
    }

    .domain span {
      color: #ff8a00;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      body {
        overflow: auto;
      }

      .page {
        padding: 12vw 8vw;
        justify-content: flex-start;
        padding-top: 22vh;
      }

      .logo {
        letter-spacing: 0.12em;
        margin-bottom: 3rem;
      }

      .headline {
        letter-spacing: 0.18em;
        line-height: 1.7;
      }

      .footer {
        position: static;
        margin-top: 5rem;
        flex-direction: column;
        gap: 1.5rem;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="logo">AUTOBOX<span>AI</span><sup class="registered">®</sup></div>

    <div class="line"></div>

    <h1 class="headline">
      Está a nascer uma nova relação com o teu <span>automóvel</span>.
    </h1>

    <div class="soon">SOON...</div>

    <footer class="footer">
      <div class="links">
        <a href="https://www.facebook.com/" target="_blank">f</a>
        <a href="https://www.instagram.com/" target="_blank">ig</a>
      </div>

      <div class="domain">AUTOBOX<span>AI</span>.PT</div>
    </footer>
  </main>
</body>
</html>
